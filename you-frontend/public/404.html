<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | YOU eSports</title>
    <meta name="description" content="Page not found. Return to YOU eSports home." />
    <meta name="robots" content="noindex, follow" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VFF3P2PZ3D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-VFF3P2PZ3D");
    </script>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

      :root {
        --bg: #070707;
        --red: #e02020;
        --red-dark: #a00000;
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.62);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: 'Montserrat', sans-serif;
        color: var(--text);
        background: var(--bg);
        overflow: hidden;
      }

      .bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
      }

      .orb.one {
        width: 720px;
        height: 720px;
        right: -220px;
        top: -180px;
        background: radial-gradient(circle, rgba(224, 32, 32, 0.26) 0%, transparent 70%);
      }

      .orb.two {
        width: 560px;
        height: 560px;
        left: -180px;
        bottom: -160px;
        background: radial-gradient(circle, rgba(130, 0, 0, 0.24) 0%, transparent 72%);
      }

      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
        background-size: 56px 56px;
      }

      .wrap {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .card {
        width: min(820px, 100%);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(155deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015));
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px);
        padding: clamp(1.4rem, 2vw, 2.4rem);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.4rem;
      }

      .brand {
        font-family: 'Bebas Neue', sans-serif;
        letter-spacing: 2px;
        font-size: clamp(26px, 4vw, 38px);
        text-decoration: none;
        color: var(--text);
      }

      .brand span {
        color: var(--red);
      }

      .badge {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        letter-spacing: 2px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(224, 32, 32, 0.35);
        color: rgba(255, 110, 110, 0.95);
        background: rgba(224, 32, 32, 0.12);
      }

      .code {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(96px, 24vw, 210px);
        line-height: 0.9;
        color: var(--red);
        text-shadow: 0 0 64px rgba(224, 32, 32, 0.45);
      }

      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(34px, 8vw, 72px);
        letter-spacing: 1.3px;
        line-height: 0.95;
      }

      p {
        max-width: 56ch;
        margin-top: 0.8rem;
        line-height: 1.8;
        color: var(--muted);
      }

      .actions {
        margin-top: 1.7rem;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        text-decoration: none;
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        letter-spacing: 1.4px;
        border-radius: 10px;
        padding: 12px 16px;
        transition: 0.2s ease;
      }

      .btn:hover {
        border-color: rgba(224, 32, 32, 0.46);
        color: #fff;
      }

      .btn.primary {
        border-color: transparent;
        background: linear-gradient(135deg, var(--red-dark), var(--red));
        box-shadow: 0 0 28px rgba(224, 32, 32, 0.3);
      }

      .footer {
        margin-top: 1.5rem;
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        letter-spacing: 1.2px;
        color: rgba(255, 255, 255, 0.34);
      }

      @media (max-width: 700px) {
        body {
          overflow: auto;
        }

        .top {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .actions {
          flex-direction: column;
        }

        .btn {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="orb one"></div>
      <div class="orb two"></div>
      <div class="grid"></div>
    </div>

    <main class="wrap">
      <section class="card">
        <div class="top">
          <a class="brand" href="/">YOU<span>eSports</span></a>
          <span class="badge">ERROR / 404</span>
        </div>

        <div class="code">404</div>
        <h1>Page Not Found</h1>
        <p>
          This page does not exist or has moved outside the arena. Use one of the options below to get back into the match.
        </p>

        <div class="actions">
          <a class="btn primary" href="/">GO TO HOME</a>
          <a class="btn" href="/#contact">CONTACT TEAM</a>
          <button class="btn" type="button" onclick="history.back()">GO BACK</button>
        </div>

        <div class="footer">YOU eSports • The Pinnacle of Esports</div>
      </section>
    </main>
  </body>
</html>
